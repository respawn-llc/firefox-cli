name: Dependency Upgrade Lane

on:
  workflow_dispatch:
    inputs:
      verify_upgrade:
        description: Run full local upgrade verification after dependency changes
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 8 * * 1"

jobs:
  dependency-upgrade-check:
    name: Dependency Upgrade Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run deps:check
      - run: bun run check
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_upgrade }}
      - run: bun run release:check:local
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_upgrade }}
