name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run release:check
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-cli-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/package
            dist/extension-artifacts
