name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional x.y.z version to release; defaults to package.json."
        required: false
        type: string
  pull_request:
    types:
      - closed
    branches:
      - main
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.event_name == 'push' && format('release-{0}', github.ref_name) || 'release-prepare' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-tag:
    name: Prepare Release Tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'autorelease'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || 'main' }}
          fetch-depth: 0
          token: ${{ secrets.OPENSOURCE_PAT }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Fetch release tags
        run: git fetch --force --tags origin "refs/tags/*:refs/tags/*"
      - name: Prepare available release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            bun scripts/prepare-release-version.ts --version "${{ inputs.version }}"
          else
            bun scripts/prepare-release-version.ts
          fi
      - name: Commit patch-version bump
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.version.outputs.changed_files }}
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
      - name: Create release tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSOURCE_PAT }}
          CUSTOM_TAG: ${{ steps.version.outputs.tag }}
          WITH_V: false
          PRERELEASE: false
      - name: Checkout Claude plugin marketplace
        uses: actions/checkout@v6
        with:
          repository: respawn-llc/claude-plugin-marketplace
          path: claude-plugin-marketplace
          token: ${{ secrets.OPENSOURCE_PAT }}
      - name: Sync Claude plugin marketplace version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          cd claude-plugin-marketplace
          jq -e '.plugins[] | select(.name == "firefox-cli")' .claude-plugin/marketplace.json >/dev/null
          tmp="$(mktemp)"
          jq --arg version "$VERSION" '(.plugins[] | select(.name == "firefox-cli") | .version) = $version' .claude-plugin/marketplace.json > "$tmp"
          mv "$tmp" .claude-plugin/marketplace.json
          if git diff --quiet -- .claude-plugin/marketplace.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "Update firefox-cli plugin to ${VERSION}"
          git push origin HEAD:main

  signed-extension:
    name: Signed Extension
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run extension:sign
        env:
          WEB_EXT_JWT_ISSUER: ${{ secrets.WEB_EXT_JWT_ISSUER }}
          WEB_EXT_JWT_SECRET: ${{ secrets.WEB_EXT_JWT_SECRET }}
          FIREFOX_CLI_AMO_CHANNEL: unlisted
      - uses: actions/upload-artifact@v7
        with:
          name: firefox-cli-signed-extension
          path: dist/extension-artifacts/*.xpi*

  package:
    name: Package (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - signed-extension
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - uses: actions/download-artifact@v8
        with:
          name: firefox-cli-signed-extension
          path: dist/extension-artifacts
      - run: bun run release:check:signed
      - name: Archive package
        if: runner.os != 'Windows'
        run: tar -czf "firefox-cli-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz" -C dist package extension-artifacts
      - name: Archive package
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/package,dist/extension-artifacts -DestinationPath "firefox-cli-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: firefox-cli-package-${{ runner.os }}-${{ runner.arch }}
          path: |
            firefox-cli-*.tar.gz
            firefox-cli-*.zip

  github-release:
    name: GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: firefox-cli-package-*
          path: release-artifacts
      - uses: actions/download-artifact@v8
        with:
          name: firefox-cli-signed-extension
          path: release-artifacts/signed-extension
      - name: Generate Changelog
        uses: mikepenz/release-changelog-builder-action@v6
        id: build_changelog
        with:
          commitMode: true
          configuration: ".github/changelog_config.json"
      - uses: ncipollo/release-action@v1.21.0
        with:
          artifactErrorsFailBuild: true
          artifacts: "release-artifacts/**/*.tar.gz,release-artifacts/**/*.zip,release-artifacts/signed-extension/*.xpi,release-artifacts/signed-extension/*.xpi.provenance.json"
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: true
          prerelease: false
          tag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSOURCE_PAT }}

  npm-publish:
    name: Publish npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - package
      - github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@^11.5.1
      - run: npm --version
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: firefox-cli-signed-extension
          path: dist/extension-artifacts
      - run: bun run npm:publish:ci

  publish-github-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - npm-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=false
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.OPENSOURCE_PAT }}
