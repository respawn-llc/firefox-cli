name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  signed-extension:
    name: Signed Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run extension:sign
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
          FIREFOX_CLI_AMO_CHANNEL: unlisted
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-cli-signed-extension
          path: dist/extension-artifacts/*.xpi

  package:
    name: Package (${{ matrix.os }})
    needs:
      - signed-extension
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - uses: actions/download-artifact@v4
        with:
          name: firefox-cli-signed-extension
          path: dist/extension-artifacts
      - run: bun run release:check:signed
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-cli-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/package
            dist/extension-artifacts
