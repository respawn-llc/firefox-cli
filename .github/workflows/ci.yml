name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run ci
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-cli-ci-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/package
            dist/extension-artifacts

  e2e-linux:
    name: E2E Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e

  package-current:
    name: Package Current OS
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run release:check:local
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-cli-package-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/package
            dist/extension-artifacts

  native-host-security:
    name: Native Host Security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: >
          bun test
          packages/native-host/src/host-broker.test.ts
          packages/native-host/src/host-launch.test.ts
          packages/native-host/src/local-ipc.test.ts
          packages/native-host/src/native-host-runtime.test.ts
          packages/native-host/src/native-host-session.test.ts
          packages/native-host/src/native-manifest.test.ts
          packages/native-host/src/native-messaging-frame.test.ts
          packages/native-host/src/pair-state.test.ts
          packages/cli/src/cli.test.ts
          scripts/test/package-check.test.ts
