<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Extension approval</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="approval-card">
      <section class="status-panel" aria-live="polite">
        <p id="approval" class="approval-state">Checking approval...</p>
        <p id="status" class="connection-state">Checking connection...</p>
      </section>
      <p id="error" hidden></p>
      <div class="actions">
        <button id="approve" class="primary-action" type="button" hidden>Approve browser control</button>
        <button id="reset" class="secondary-action" type="button">Reset approval</button>
      </div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
